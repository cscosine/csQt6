# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks

repos:
  - repo: local
    hooks:
      - id: check-generated-meta-project
        name: Check generated project consistency
        entry: python ./project.py --generate-meta-project
        language: python
        pass_filenames: false
        always_run: true
        additional_dependencies:
          - GitPython
          - pre-commit
          - requests
          - keyring
          - jinja2

      - id: check-generated-workflow-yml
        name: Check generated YAML Workflow consistency
        entry: python ./project.py --generate-workflow
        language: python
        pass_filenames: false
        always_run: true
        additional_dependencies:
          - GitPython
          - pre-commit
          - requests
          - keyring
          - jinja2

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files # prevents giant files from being committed.
      - id: check-case-conflict # checks for files that would conflict in case-insensitive filesystems.
      - id: check-merge-conflict # checks for files that contain merge conflict strings.
      - id: check-yaml # checks yaml files for parseable syntax.
        args: [--allow-multiple-documents]
      - id: detect-private-key # detects the presence of private keys.
      - id: end-of-file-fixer # ensures that a file is either empty, or ends with one newline.
      - id: fix-byte-order-marker # removes utf-8 byte order marker.
      - id: mixed-line-ending # replaces or checks mixed line ending.
      - id: requirements-txt-fixer # sorts entries in requirements.txt.
      - id: trailing-whitespace # trims trailing whitespace.
      - id: check-executables-have-shebangs # ensures that (non-binary) executables have a shebang.
      - id: check-shebang-scripts-are-executable # ensures that (non-binary) files with a shebang are executable.
      - id: check-illegal-windows-names
      - id: check-json
      - id: check-symlinks
      - id: destroyed-symlinks
      - id: forbid-submodules

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.9
    hooks:
      - id: ruff
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v20.1.4
    hooks:
      - id: clang-format
        exclude: '\.m$'
        args: ["-style=file:./csProjectManager/hooks/.clang-format"]

  - repo: local
    hooks:
      - id: lint-unstaged
        name: Lint unstaged files
        entry: python ./csProjectManager/hooks/check_unstaged.py
        language: python
        always_run: true

