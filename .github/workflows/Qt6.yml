name: Qt6

on:
  push:
    branches:
      - main
      - dev
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1'

jobs:
  release-from-artifacts:
    needs: orchestrator-matrix
    runs-on: ubuntu-latest

    if: ${{ github.ref_type == 'tag' }}

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Show downloaded files
        run: find artifacts -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            artifacts/**/*    

  orchestrator-matrix:
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            os_version: ubuntu22.04
            architecture: x64
            architecture_variant: generic
            compiler: gcc
            c_compiler: gcc
            cpp_compiler: g++
            compiler_version: default
            generator: ninja
            generator_type: singleconfig
            generator_cmake: Ninja
            runner: ubuntu-22.04
          - os: linux
            os_version: ubuntu22.04
            architecture: x64
            architecture_variant: generic
            compiler: gcc
            c_compiler: gcc
            cpp_compiler: g++
            compiler_version: default
            generator: ninjamulticonfig
            generator_type: multiconfig
            generator_cmake: Ninja Multi-Config
            runner: ubuntu-22.04
          - os: linux
            os_version: ubuntu22.04
            architecture: x64
            architecture_variant: generic
            compiler: clang
            c_compiler: clang
            cpp_compiler: clang++
            compiler_version: default
            generator: ninja
            generator_type: singleconfig
            generator_cmake: Ninja
            runner: ubuntu-22.04
          - os: linux
            os_version: ubuntu22.04
            architecture: x64
            architecture_variant: generic
            compiler: clang
            c_compiler: clang
            cpp_compiler: clang++
            compiler_version: default
            generator: ninjamulticonfig
            generator_type: multiconfig
            generator_cmake: Ninja Multi-Config
            runner: ubuntu-22.04
          - os: linux
            os_version: ubuntu24.04
            architecture: x64
            architecture_variant: generic
            compiler: gcc
            c_compiler: gcc
            cpp_compiler: g++
            compiler_version: default
            generator: ninja
            generator_type: singleconfig
            generator_cmake: Ninja
            runner: ubuntu-24.04
          - os: linux
            os_version: ubuntu24.04
            architecture: x64
            architecture_variant: generic
            compiler: gcc
            c_compiler: gcc
            cpp_compiler: g++
            compiler_version: default
            generator: ninjamulticonfig
            generator_type: multiconfig
            generator_cmake: Ninja Multi-Config
            runner: ubuntu-24.04
          - os: linux
            os_version: ubuntu24.04
            architecture: x64
            architecture_variant: generic
            compiler: clang
            c_compiler: clang
            cpp_compiler: clang++
            compiler_version: default
            generator: ninja
            generator_type: singleconfig
            generator_cmake: Ninja
            runner: ubuntu-24.04
          - os: linux
            os_version: ubuntu24.04
            architecture: x64
            architecture_variant: generic
            compiler: clang
            c_compiler: clang
            cpp_compiler: clang++
            compiler_version: default
            generator: ninjamulticonfig
            generator_type: multiconfig
            generator_cmake: Ninja Multi-Config
            runner: ubuntu-24.04
          - os: windows
            os_version: v10
            architecture: x64
            architecture_variant: generic
            compiler: msvc
            compiler_version: default
            generator: msvc2022
            generator_type: multiconfig
            generator_cmake: Visual Studio 17 2022
            runner: windows-2022
          - os: windows
            os_version: v10
            architecture: x64
            architecture_variant: generic
            compiler: msvc
            compiler_version: default
            generator: msvc2026
            generator_type: multiconfig
            generator_cmake: Visual Studio 18 2026
            runner: windows-2025-vs2026
          - os: windows
            os_version: v10
            architecture: x64
            architecture_variant: generic
            compiler: msvcclang
            compiler_version: default
            generator: msvc2022
            generator_type: multiconfig
            generator_cmake: Visual Studio 17 2022
            runner: windows-2022
          - os: windows
            os_version: v10
            architecture: x64
            architecture_variant: generic
            compiler: msvcclang
            compiler_version: default
            generator: msvc2026
            generator_type: multiconfig
            generator_cmake: Visual Studio 18 2026
            runner: windows-2025-vs2026

    steps:
      - name: qt6
        uses: actions/checkout@v6
        with:
          repository: qt/qt5.git
          path: workspace/qt6
          ref: v6.10.2
          fetch-depth: 1

      - name: Run command install apt packages
        if: ${{ matrix.os == 'linux' && startsWith(matrix.os_version, 'ubuntu') }}
        shell: bash
        run: |
          set -euo pipefail # enable strict mode
          
          if [ -t 0 ]; then
              # if running in interactive terminal, ask for password if needed
              SUDO="sudo"
          else
              # if running in a non-interactive terminal (e.g. in CI workflows), use sudo without 
              #   password prompt (fail if password is needed)
              SUDO="sudo -n"
          fi
          
          packages=(
            libfontconfig1-dev
            libfreetype-dev
            libgtk-3-dev
            libx11-dev
            libx11-xcb-dev
            libxcb-cursor-dev
            libxcb-glx0-dev
            libxcb-icccm4-dev
            libxcb-image0-dev
            libxcb-keysyms1-dev
            libxcb-randr0-dev
            libxcb-render-util0-dev
            libxcb-shape0-dev
            libxcb-shm0-dev
            libxcb-sync-dev
            libxcb-util-dev
            libxcb-xfixes0-dev
            libxcb-xkb-dev
            libxcb1-dev
            libxext-dev
            libxfixes-dev
            libxi-dev
            libxkbcommon-dev
            libxkbcommon-x11-dev
          )
          
          missing=()
          
          for pkg in "${packages[@]}"; do
            dpkg -s "$pkg" &>/dev/null || missing+=("$pkg")
          done
          
          if [ ${#missing[@]} -ne 0 ]; then
          
            sudo apt update
          
            echo "Need to install missing packages: ${missing[*]}"
            sudo apt install -y "${missing[@]}"
          else
            echo "All packages already installed."
          fi

      - name: Run command init repo (Linux-Ubuntu)
        if: ${{ matrix.os == 'linux' && startsWith(matrix.os_version, 'ubuntu') }}
        shell: bash
        run: |
          cd workspace/qt6
          ./init-repository

      - name: Run command configure/build/install (Linux-Ubuntu)
        if: ${{ matrix.os == 'linux' && startsWith(matrix.os_version, 'ubuntu') }}
        shell: bash
        run: |
          set -euo pipefail
          
          cd workspace/
          
          WORKSPACE_ROOT=$(pwd)
          FOLDER_NAME="csv1-${{ matrix.os }}-${{ matrix.os_version }}-${{ matrix.architecture }}-${{ matrix.architecture_variant }}-${{ matrix.compiler }}-${{ matrix.compiler_version }}-${{ matrix.generator }}"
          GENERATOR_TYPE="${{ matrix.generator_type }}"
          GENERATOR_TYPE_SINGLECONFIG="singleconfig"
          GENERATOR_TYPE_MULTICONFIG="multiconfig"
          GENERATOR_CMAKE="${{ matrix.generator_cmake }}"
          C_COMPILER="${{ matrix.c_compiler }}"
          CPP_COMPILER="${{ matrix.cpp_compiler }}"
          
          : "${FOLDER_NAME:?missing FOLDER_NAME}"
          : "${GENERATOR_TYPE:?missing GENERATOR_TYPE}"
          : "${GENERATOR_TYPE_SINGLECONFIG:?missing GENERATOR_TYPE_SINGLECONFIG}"
          : "${GENERATOR_TYPE_MULTICONFIG:?missing GENERATOR_TYPE_MULTICONFIG}"
          : "${GENERATOR_CMAKE:?missing GENERATOR_CMAKE}"
          
          mkdir -p "install/${FOLDER_NAME}/qt6"
          
          if [[ "${GENERATOR_TYPE}" == "${GENERATOR_TYPE_SINGLECONFIG}" ]]; then
              mkdir -p "build/${FOLDER_NAME}/qt6/debug"
              cd "build/${FOLDER_NAME}/qt6/debug"
              "${WORKSPACE_ROOT}/qt6/configure" -debug -cmake-generator "${GENERATOR_CMAKE}" ${C_COMPILER:+-DCMAKE_C_COMPILER="${C_COMPILER}"} ${CPP_COMPILER:+-DCMAKE_CXX_COMPILER="${CPP_COMPILER}"} -prefix "${WORKSPACE_ROOT}/install/${FOLDER_NAME}/qt6"
              cmake --build . --parallel 4
              cmake --install .
          
              cd "${WORKSPACE_ROOT}"
          
              mkdir -p "build/${FOLDER_NAME}/qt6/release"
              cd "build/${FOLDER_NAME}/qt6/release"
              "${WORKSPACE_ROOT}/qt6/configure" -release -cmake-generator "${GENERATOR_CMAKE}" ${C_COMPILER:+-DCMAKE_C_COMPILER="${C_COMPILER}"} ${CPP_COMPILER:+-DCMAKE_CXX_COMPILER="${CPP_COMPILER}"} -prefix "${WORKSPACE_ROOT}/install/${FOLDER_NAME}/qt6"
              cmake --build . --parallel 4
              cmake --install .
          
          elif [[ "${GENERATOR_TYPE}" == "${GENERATOR_TYPE_MULTICONFIG}" ]]; then
              mkdir -p "build/${FOLDER_NAME}/qt6"
              cd "build/${FOLDER_NAME}/qt6"
              "${WORKSPACE_ROOT}/qt6/configure" -cmake-generator "${GENERATOR_CMAKE}" ${C_COMPILER:+-DCMAKE_C_COMPILER="${C_COMPILER}"} ${CPP_COMPILER:+-DCMAKE_CXX_COMPILER="${CPP_COMPILER}"} -prefix "${WORKSPACE_ROOT}/install/${FOLDER_NAME}/qt6"
              cmake --build . --config Debug --parallel 4
              cmake --build . --config Release --parallel 4
              cmake --install . --config Debug
              cmake --install . --config Release
          
          else
              echo "Unknown generator_type: ${GENERATOR_TYPE}"
              exit 1
          fi

      - name: Run command init repo (Windows)
        if: ${{ matrix.os == 'windows' }}
        shell: powershell
        run: |
          cd workspace/qt6
          ./init-repository.bat

      - name: Run command configure/build/install (Windows)
        if: ${{ matrix.os == 'windows' }}
        shell: powershell
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          
          cd workspace
          
          $WORKSPACE_ROOT = Get-Location
          $FOLDER_NAME = "csv1-${{ matrix.os }}-${{ matrix.os_version }}-${{ matrix.architecture }}-${{ matrix.architecture_variant }}-${{ matrix.compiler }}-${{ matrix.compiler_version }}-${{ matrix.generator }}"
          $GENERATOR_TYPE = "${{ matrix.generator_type }}"
          $GENERATOR_TYPE_SINGLECONFIG = "singleconfig"
          $GENERATOR_TYPE_MULTICONFIG = "multiconfig"
          $GENERATOR_CMAKE = "${{ matrix.generator_cmake }}"
          $C_COMPILER = "${{ matrix.c_compiler }}"
          $CPP_COMPILER = "${{ matrix.cpp_compiler }}"
          
          New-Item -ItemType Directory -Force -Path "$WORKSPACE_ROOT/install/$FOLDER_NAME/qt6" | Out-Null
          
          $CMAKE_ARGS = @()
          if ($C_COMPILER) { $CMAKE_ARGS += "-DCMAKE_C_COMPILER=$C_COMPILER" }
          if ($CPP_COMPILER) { $CMAKE_ARGS += "-DCMAKE_CXX_COMPILER=$CPP_COMPILER" }
          
          if ($GENERATOR_TYPE -eq $GENERATOR_TYPE_SINGLECONFIG) {
          
              $DEBUG_DIR = "$WORKSPACE_ROOT/build/$FOLDER_NAME/qt6/debug"
              New-Item -ItemType Directory -Force -Path $DEBUG_DIR | Out-Null
              Set-Location $DEBUG_DIR
          
              & "$WORKSPACE_ROOT/qt6/configure.bat" -debug -cmake-generator $GENERATOR_CMAKE @CMAKE_ARGS -prefix "$WORKSPACE_ROOT/install/$FOLDER_NAME/qt6"
              cmake --build . --parallel 4
              cmake --install .
          
              $RELEASE_DIR = "$WORKSPACE_ROOT/build/$FOLDER_NAME/qt6/release"
              New-Item -ItemType Directory -Force -Path $RELEASE_DIR | Out-Null
              Set-Location $RELEASE_DIR
          
              & "$WORKSPACE_ROOT/qt6/configure.bat" -release -cmake-generator $GENERATOR_CMAKE @CMAKE_ARGS -prefix "$WORKSPACE_ROOT/install/$FOLDER_NAME/qt6"
              cmake --build . --parallel 4
              cmake --install .
          
          }
          elseif ($GENERATOR_TYPE -eq $GENERATOR_TYPE_MULTICONFIG) {
          
              $BUILD_DIR = "$WORKSPACE_ROOT/build/$FOLDER_NAME/qt6"
              New-Item -ItemType Directory -Force -Path $BUILD_DIR | Out-Null
              Set-Location $BUILD_DIR
          
              & "$WORKSPACE_ROOT/qt6/configure.bat" -cmake-generator $GENERATOR_CMAKE @CMAKE_ARGS -prefix "$WORKSPACE_ROOT/install/$FOLDER_NAME/qt6"
          
              cmake --build . --config Debug --parallel 4
              cmake --build . --config Release --parallel 4
          
              cmake --install . --config Debug
              cmake --install . --config Release
          
          }
          else {
              Write-Host "Unknown generator_type: $GENERATOR_TYPE"
              exit 1
          }

      - name: Create Archives
        env:
          VERSIONS: ${{ steps.versions.outputs.packages }}
        shell: python
        run: |
          import json
          import os
          import tarfile
          from pathlib import Path
          
          versions = json.loads(os.environ['VERSIONS'])
          
          for entry in versions:
              name = entry['name']
              version = entry['version']
              install_subdir = Path('workspace/install/csv1-${{ matrix.os }}-${{ matrix.os_version }}-${{ matrix.architecture }}-${{ matrix.architecture_variant }}-${{ matrix.compiler }}-${{ matrix.compiler_version }}-${{ matrix.generator }}').resolve()
              input_path = Path(install_subdir / Path(name)).resolve()
              output_path = Path(install_subdir / Path('csv1-${{ matrix.os }}-${{ matrix.os_version }}-${{ matrix.architecture }}-${{ matrix.architecture_variant }}-${{ matrix.compiler }}-${{ matrix.compiler_version }}-${{ matrix.generator }}' + '-' + name + '-' + version + '.tar.gz')).resolve()
              
              with tarfile.open(output_path, 'w:gz') as tar:
                  for path in input_path.rglob('*'):
                      resolved_path = path.resolve()
                      arcname = path.resolve().relative_to(install_subdir)
                      tar.add(resolved_path, arcname=arcname)

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: Qt6-v6.10.2-csv1-${{ matrix.os }}-${{ matrix.os_version }}-${{ matrix.architecture }}-${{ matrix.architecture_variant }}-${{ matrix.compiler }}-${{ matrix.compiler_version }}-${{ matrix.generator }}
          path: workspace/install/csv1-${{ matrix.os }}-${{ matrix.os_version }}-${{ matrix.architecture }}-${{ matrix.architecture_variant }}-${{ matrix.compiler }}-${{ matrix.compiler_version }}-${{ matrix.generator }}/*.tar.gz
